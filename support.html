<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Customer Support - xyz</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --green-deep: #0a5c36;
    --green-main: #16a34a;
    --green-mid: #22c55e;
    --green-light: #86efac;
    --green-pale: #dcfce7;
    --green-ghost: #f0fdf4;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --red: #ef4444;
    --bubble-user-bg: #16a34a;
    --bubble-user-text: #fff;
    --bubble-admin-bg: #fff;
    --bubble-admin-text: #1f2937;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--gray-100); color: var(--gray-800);
    display: flex; flex-direction: column;
  }

  /* ── FULL PAGE SHELL ── */
  .phone-shell {
    width: 100%; height: 100%;
    background: var(--white); overflow: hidden;
    display: flex; flex-direction: column; position: relative;
  }

  /* ── HEADER ── */
  .chat-header {
    background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-main) 100%);
    padding: 14px 16px 12px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; position: relative; z-index: 10;
    box-shadow: 0 2px 12px rgba(10,92,54,0.25);
  }
  .header-back {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: var(--transition);
  }
  .header-back:hover { background: rgba(255,255,255,0.25); }

  .header-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center; color: #fff;
    font-size: 18px; flex-shrink: 0; overflow: hidden;
  }
  .header-info { flex: 1; min-width: 0; }
  .header-name { color: #fff; font-size: 16px; font-weight: 700; line-height: 1.2; }
  .header-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: #86efac; animation: pulse 2s infinite; }
  .status-dot.offline { background: rgba(255,255,255,0.4); }
  .status-text { color: rgba(255,255,255,0.85); font-size: 12px; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(1.2)} }

  .header-actions { display: flex; gap: 4px; }
  .hdr-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: var(--transition);
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── MESSAGES AREA ── */
  #messages-area {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--gray-50); scroll-behavior: smooth;
  }
  #messages-area::-webkit-scrollbar { width: 4px; }
  #messages-area::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  /* ── WELCOME BANNER ── */
  .welcome-banner {
    background: linear-gradient(135deg, var(--green-ghost), var(--green-pale));
    border: 1.5px solid var(--green-light); border-radius: 14px;
    padding: 14px 16px; text-align: center; margin-bottom: 4px; max-width: 500px; margin: 0 auto 4px auto; width: 100%;
  }
  .wb-icon { font-size: 32px; margin-bottom: 6px; color: var(--green-main); }
  .wb-title { font-size: 15px; font-weight: 700; color: var(--green-deep); margin-bottom: 4px; }
  .wb-text { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

  /* ── SUGGESTED & FAQ QUERIES ── */
  .suggested-section { display: flex; flex-direction: column; gap: 6px; max-width: 500px; margin: 0 auto; width: 100%; }
  .sq-label { font-size: 11px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.5px; padding: 0 2px; }
  .sq-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .sq-chip {
    padding: 7px 13px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--white); border: 1.5px solid var(--green-light);
    color: var(--green-deep); cursor: pointer; transition: var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .sq-chip:hover, .sq-chip:active { background: var(--green-pale); border-color: var(--green-main); transform: scale(0.97); }

  /* ── DATE DIVIDER ── */
  .date-divider {
    text-align: center; color: var(--gray-400); font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; margin: 4px auto; max-width: 600px; width: 100%;
  }
  .date-divider::before, .date-divider::after { content:''; flex:1; height:1px; background:var(--gray-200); }

  /* ── MSG ROW ── */
  .msg-row { display: flex; align-items: flex-end; gap: 7px; max-width: 700px; width: 100%; margin: 0 auto; }
  .msg-row.from-user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; background: var(--green-deep); overflow: hidden;
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; }
  .msg-row.from-user .bubble-wrap { align-items: flex-end; }
  .msg-row.from-admin .bubble-wrap { align-items: flex-start; }

  .bubble {
    padding: 10px 13px; border-radius: 16px; font-size: 14.5px;
    line-height: 1.55; word-break: break-word; position: relative;
    animation: bubbleIn 0.22s ease; user-select: text; cursor: default;
  }
  @keyframes bubbleIn { from{opacity:0;transform:scale(.92) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .bubble.from-user {
    background: var(--bubble-user-bg); color: var(--bubble-user-text);
    border-bottom-right-radius: 4px; box-shadow: 0 2px 8px rgba(22,163,74,0.22);
  }
  .bubble.from-admin {
    background: var(--bubble-admin-bg); color: var(--bubble-admin-text);
    border-bottom-left-radius: 4px; box-shadow: 0 1px 6px rgba(0,0,0,0.09);
  }
  .bubble.deleted { opacity: 0.5; font-style: italic; color: var(--gray-400) !important; background: var(--gray-100) !important; }
  .bubble.edited::after { content: ' (সম্পাদিত)'; font-size: 11px; opacity: 0.65; }
  .bubble .ai-tag { font-size: 10px; background: var(--green-pale); color: var(--green-deep); padding: 2px 6px; border-radius: 10px; margin-bottom: 4px; display: inline-block;}

  .msg-meta { font-size: 10.5px; color: var(--gray-400); margin-top: 3px; padding: 0 3px; display: flex; align-items: center; gap: 4px; }
  .msg-row.from-user .msg-meta { justify-content: flex-end; }

  /* ── TYPING BUBBLE ── */
  .typing-row { display: flex; align-items: flex-end; gap: 7px; max-width: 700px; margin: 0 auto; width: 100%; }
  .typing-bubble {
    background: var(--bubble-admin-bg); border-radius: 16px; border-bottom-left-radius: 4px;
    padding: 12px 16px; display: flex; align-items: center; gap: 5px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.09);
  }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-400); animation: typBounce 1.2s infinite; }
  .t-dot:nth-child(2) { animation-delay: 0.2s; }
  .t-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── CONTEXT MENU ── */
  .ctx-menu {
    position: fixed; z-index: 1000;
    background: var(--white); border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    overflow: hidden; min-width: 160px;
    animation: ctxIn 0.15s ease;
    border: 1px solid var(--gray-200);
  }
  @keyframes ctxIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; cursor: pointer; font-size: 14px;
    transition: var(--transition); color: var(--gray-700);
  }
  .ctx-item:hover { background: var(--green-ghost); color: var(--green-deep); }
  .ctx-item.danger { color: var(--red); }
  .ctx-item.danger:hover { background: #fef2f2; }
  .ctx-divider { height: 1px; background: var(--gray-100); }

  /* ── EDIT OVERLAY ── */
  .edit-overlay {
    position: absolute; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.5); display: flex;
    align-items: flex-end; justify-content: center;
    padding-bottom: calc(20px + var(--safe-bottom));
    backdrop-filter: blur(2px); animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .edit-box {
    background: var(--white); border-radius: 16px 16px 0 0;
    padding: 16px; width: 100%; max-width: 500px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.14);
  }
  .edit-label { font-size: 12px; font-weight: 700; color: var(--gray-500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .edit-ta {
    width: 100%; border: 1.5px solid var(--green-main); border-radius: 10px;
    padding: 10px 12px; font-family: inherit; font-size: 14px;
    outline: none; resize: none; min-height: 64px; color: var(--gray-800);
    background: var(--gray-50);
  }
  .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
  .edit-btn {
    flex: 1; padding: 10px; border-radius: 10px; font-family: inherit;
    font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition);
  }
  .edit-btn.confirm { background: var(--green-main); color: #fff; }
  .edit-btn.confirm:hover { background: var(--green-deep); }
  .edit-btn.cancel { background: var(--gray-100); color: var(--gray-600); }

  /* ── INPUT AREA ── */
  .input-wrapper {
    flex-shrink: 0; background: var(--white);
    border-top: 1px solid var(--gray-200);
    padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom));
    display: flex; align-items: flex-end; justify-content: center;
    position: relative; z-index: 20;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .input-container { display: flex; align-items: flex-end; gap: 8px; max-width: 700px; width: 100%; }
  
  .emoji-btn, .send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; transition: var(--transition);
  }
  .emoji-btn { background: var(--gray-100); color: var(--gray-500); font-size: 20px; }
  .emoji-btn:hover { background: var(--green-ghost); color: var(--green-deep); }
  .msg-input-wrap { flex: 1; position: relative; }
  .msg-input {
    width: 100%; border: 1.5px solid var(--gray-200); border-radius: 22px;
    padding: 10px 16px; font-family: inherit; font-size: 14.5px;
    outline: none; resize: none; max-height: 100px; min-height: 40px;
    color: var(--gray-800); background: var(--gray-50);
    transition: var(--transition); line-height: 1.4; display: block;
  }
  .msg-input:focus { border-color: var(--green-main); background: var(--white); box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }
  .send-btn { background: var(--green-main); color: #fff; font-size: 16px; }
  .send-btn:hover { background: var(--green-deep); transform: scale(1.06); }
  .send-btn:disabled { background: var(--gray-300); cursor: not-allowed; transform: none; }

  /* ── EMOJI PICKER ── */
  .emoji-picker {
    position: absolute; bottom: 62px; left: 12px;
    background: var(--white); border-radius: 14px;
    padding: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.16);
    border: 1px solid var(--gray-200); z-index: 100;
    display: none; flex-wrap: wrap; gap: 6px; max-width: 280px;
    animation: ctxIn 0.15s ease;
  }
  .emoji-picker.open { display: flex; }
  .e-item { font-size: 22px; cursor: pointer; border-radius: 6px; padding: 3px; transition: var(--transition); }
  .e-item:hover { background: var(--green-ghost); transform: scale(1.2); }

  /* ── SCROLL BUTTON ── */
  .scroll-down-btn {
    position: absolute; bottom: 80px; right: 24px; z-index: 50;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--green-main); color: #fff; border: none;
    font-size: 16px; cursor: pointer; display: none;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 10px rgba(22,163,74,0.3); transition: var(--transition);
  }
  .scroll-down-btn.visible { display: flex; }

  /* ── CONNECTION STATUS ── */
  .conn-banner {
    background: var(--red); color: #fff; text-align: center;
    font-size: 13px; font-weight: 600; padding: 6px; display: none;
  }
  .conn-banner.show { display: block; }
  .conn-banner i { margin-right: 5px; }

  /* ── OVERLAY MASK ── */
  #overlay-mask { position: fixed; inset: 0; z-index: 900; display: none; }
  #overlay-mask.show { display: block; }
</style>
</head>
<body>
<div class="phone-shell" id="phone-shell">

  <!-- Offline Banner -->
  <div class="conn-banner" id="conn-banner"><i class="fa-solid fa-triangle-exclamation"></i> ইন্টারনেট সংযোগ নেই</div>

  <!-- Header -->
  <div class="chat-header">
    <button class="header-back" onclick="window.location.href='home.html'"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="header-avatar"><i class="fa-solid fa-headset"></i></div>
    <div class="header-info">
      <div class="header-name">ShopSupport</div>
      <div class="header-status">
        <div class="status-dot offline" id="admin-dot"></div>
        <div class="status-text" id="admin-status-text">অফলাইন</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" title="সার্চ"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button class="hdr-btn" title="আরও"><i class="fa-solid fa-ellipsis-vertical"></i></button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages-area">
    <!-- Injected by JS -->
  </div>

  <!-- Scroll Down Button -->
  <button class="scroll-down-btn" id="scroll-down-btn" onclick="scrollToBottom()"><i class="fa-solid fa-arrow-down"></i></button>

  <!-- Input -->
  <div class="input-wrapper" id="input-wrapper">
    <div class="input-container">
      <button class="emoji-btn" id="emoji-btn" onclick="toggleEmoji()"><i class="fa-regular fa-face-smile"></i></button>
      <div class="msg-input-wrap">
        <textarea class="msg-input" id="msg-input" placeholder="বার্তা লিখুন…" rows="1" onkeydown="handleKey(event)" oninput="onInputChange(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Emoji Picker -->
  <div class="emoji-picker" id="emoji-picker"></div>

  <!-- Edit Overlay -->
  <div class="edit-overlay" id="edit-overlay" style="display:none" onclick="cancelEdit(event)">
    <div class="edit-box" onclick="e=>e.stopPropagation()">
      <div class="edit-label">বার্তা সম্পাদনা করুন</div>
      <textarea class="edit-ta" id="edit-ta" rows="3"></textarea>
      <div class="edit-actions">
        <button class="edit-btn cancel" onclick="cancelEdit()">বাতিল</button>
        <button class="edit-btn confirm" onclick="confirmEdit()">আপডেট করুন</button>
      </div>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctx-menu" style="display:none">
  <div class="ctx-item" onclick="ctxCopy()"><i class="fa-regular fa-clipboard"></i> কপি করুন</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" id="ctx-edit-btn" onclick="ctxEdit()"><i class="fa-solid fa-pen-to-square"></i> সম্পাদনা করুন</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" onclick="ctxDelete()"><i class="fa-solid fa-trash-can"></i> মুছুন</div>
</div>
<div id="overlay-mask" onclick="closeCtxMenu()"></div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5p-7Cgep9aGf6omMXDH8LOTy0C76jJaQ",
    authDomain: "e-commerce-shop-24.firebaseapp.com",
    projectId: "e-commerce-shop-24",
    storageBucket: "e-commerce-shop-24.firebasestorage.app",
    messagingSenderId: "1000897291264",
    appId: "1:1000897291264:web:4f1e78554c3e69d310a4e5",
    measurementId: "G-MCFXRFDFT5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  window._db = db;
  window._fs = { collection, doc, setDoc, getDoc, addDoc, onSnapshot, updateDoc, deleteDoc, serverTimestamp, query, orderBy };
  window._firebaseReady = true;

  // ── Auth Guard & Fetch User Data ──
  onAuthStateChanged(auth, async (user) => {
    if(!user) {
        window.location.href = 'home.html';
        return;
    }
    window.USER_ID = user.uid;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if(userDoc.exists()){
        const data = userDoc.data();
        window._userName = data.name || user.displayName || 'User';
        window._userPhoto = user.photoURL || '';
    }
    initApp();
  });

  // ── Strict Presence Logic ──
  window.setUserPresence = async function(isOnline) {
    if(!window.USER_ID) return;
    await setDoc(doc(db,'userStatus',window.USER_ID), { online: isOnline, lastSeen: serverTimestamp(), userId: window.USER_ID }, {merge:true});
  };

  const handlePresence = () => { 
    window.setUserPresence(document.hasFocus() && document.visibilityState === "visible"); 
  };
  
  document.addEventListener("visibilitychange", handlePresence);
  window.addEventListener("focus", handlePresence);
  window.addEventListener("blur", handlePresence);
  window.addEventListener('pagehide', () => window.setUserPresence(false));
  window.addEventListener('beforeunload', () => window.setUserPresence(false));

  function formatLastSeen(date) {
    if(!date) return 'অফলাইন';
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMins / 60);
    const diffDays = Math.floor(diffHours / 24);

    if (diffMins < 1) return 'এইমাত্র';
    if (diffMins < 60) return `${diffMins} মিনিট আগে`;
    if (diffHours < 24) return `${diffHours} ঘন্টা আগে`;
    if (diffDays < 7) {
        const days = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];
        const time = date.toLocaleTimeString('bn-BD', {hour:'numeric', minute:'numeric', hour12:true});
        return `${days[date.getDay()]} ${time}`;
    }
    return date.toLocaleDateString('bn-BD');
  }

  window.listenAdminStatus = function() {
    const { onSnapshot, doc } = window._fs;
    onSnapshot(doc(db,'adminStatus','admin'), (snap) => {
      const data = snap.exists() ? snap.data() : null;
      const online = data && data.online;
      window._adminOnline = online;

      document.getElementById('admin-dot').className = 'status-dot '+(online?'online':'offline');
      if(online) {
         document.getElementById('admin-status-text').textContent = 'অনলাইন';
      } else if(data && data.lastSeen) {
         document.getElementById('admin-status-text').textContent = 'লাস্ট সিন: ' + formatLastSeen(data.lastSeen.toDate());
      } else {
         document.getElementById('admin-status-text').textContent = 'অফলাইন';
      }
    });
  };

  window.loadUserSettings = async function() {
    const { getDoc, doc } = window._fs;
    const snap = await getDoc(doc(db,'settings','config'));
    window._settings = snap.exists() ? {...defaultSettings(), ...snap.data()} : defaultSettings();
  };

  let isInitialLoad = true;
  let processedNotifications = {};

  window.listenMessages = function() {
    const { onSnapshot, collection, query, orderBy } = window._fs;
    const q = query(collection(db,'chats',window.USER_ID,'messages'), orderBy('timestamp'));
    
    window._msgUnsub = onSnapshot(q, (snap) => {
      window._messages = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderMessages();

      // Notifications logic (Change 1)
      snap.docChanges().forEach(change => {
          if (!isInitialLoad && change.type === 'added') {
              const data = change.doc.data();
              if (data.sender === 'admin' && document.visibilityState === 'hidden' && navigator.onLine) {
                  if (!processedNotifications[change.doc.id]) {
                      processedNotifications[change.doc.id] = true;
                      playNotification("ShopSupport", data.text);
                  }
              }
          }
      });
      isInitialLoad = false;
    });
  };

  window.sendToFirestore = async function(text) {
    const { addDoc, doc, collection, serverTimestamp, setDoc } = window._fs;
    const msgRef = await addDoc(collection(db,'chats',window.USER_ID,'messages'), {
      text, sender:'user', timestamp: serverTimestamp(), read:false, deleted:false, edited:false
    });
    await setDoc(doc(db,'chats',window.USER_ID), {
      name: window._userName || 'ইউজার',
      photoURL: window._userPhoto || '',
      lastMessage:text, lastMessageTime:serverTimestamp(), lastSender:'user',
      unreadAdmin: (window._users?.find(u=>u.id===window.USER_ID)?.unreadAdmin||0)+1,
      online: true, userId: window.USER_ID
    },{merge:true});

    if (!window._adminOnline && window._settings && window._settings.geminiApiKey) {
        triggerAIAutoReply(text);
    }
    return msgRef.id;
  };

  async function triggerAIAutoReply(userText) {
    try {
        const apiKey = window._settings.geminiApiKey;
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `You are a polite customer support agent for a Bengali e-commerce shop. Keep the reply short and very helpful in Bengali language. Customer says: ${userText}` }] }]
            })
        });
        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;

        const { addDoc, collection, serverTimestamp, setDoc, doc } = window._fs;
        await addDoc(collection(db, 'chats', window.USER_ID, 'messages'), {
            text: aiText, sender:'admin', timestamp: serverTimestamp(), read:false, deleted:false, edited:false, isAI: true
        });
        await setDoc(doc(db, 'chats', window.USER_ID), {
            lastMessage: aiText, lastMessageTime: serverTimestamp(), lastSender: 'admin', unreadAdmin: 0
        },{merge:true});
    } catch (e) { console.log('AI Failed', e); }
  }

  window.updateMsgFirestore = async function(msgId, data) {
    const { updateDoc, doc } = window._fs;
    await updateDoc(doc(db,'chats',window.USER_ID,'messages',msgId), data);
  };

  window.setTypingFirestore = async function(typing) {
    const { setDoc, doc } = window._fs;
    await setDoc(doc(db,'chats',window.USER_ID), {userTyping: typing}, {merge:true});
  };

  window.listenAdminTyping = function() {
    const { onSnapshot, doc } = window._fs;
    onSnapshot(doc(db,'chats',window.USER_ID), (snap) => {
      const d = snap.data()||{};
      window._adminIsTyping = d.adminTyping || false;
      setAdminTyping(window._adminIsTyping);
    });
  };
</script>

<script>
// STATE
window._messages = [];
window._settings = null;
window._adminIsTyping = false; // Added for Change 2

let ctxMsgId = null;
let editMsgId = null;
let typingTimer = null;
let isAtBottom = true;

const EMOJIS = ['😊','😂','❤️','👍','🎉','😍','🙏','✅','🔥','💯','😢','😮','🤔','👋','💬','🛒','📦','✨','⭐','💚'];

// Request Notification Permission
if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
    Notification.requestPermission();
}
function playNotification(title, body) {
    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/1041/1041916.png" });
    }
}

function defaultSettings(){
  return {
    welcomeMsg: 'স্বাগতম <user_name>! আমাদের সাপোর্ট টিমে আপনাকে স্বাগতম। কীভাবে সাহায্য করতে পারি?',
    faqs: [],
    autoReply: true,
    keywords: [],
    suggestedQueries: ['অর্ডার স্ট্যাটাস', 'ডেলিভারি চার্জ কত?', 'পণ্য ফেরত কীভাবে?', 'পেমেন্ট পদ্ধতি']
  };
}

// RENDER
function renderMessages(){
  const area = document.getElementById('messages-area');
  const s = window._settings || defaultSettings();
  let html = '';

  let rawWelcomeMsg = s.welcomeMsg || 'স্বাগতম! আমাদের সাপোর্ট টিমে আপনাকে স্বাগতম। কীভাবে সাহায্য করতে পারি?';
  let parsedWelcomeMsg = rawWelcomeMsg.replace(/<user_name>/g, window._userName || 'গ্রাহক');

  html += `
    <div class="welcome-banner">
      <div class="wb-icon"><i class="fa-solid fa-headset"></i></div>
      <div class="wb-title">ShopSupport</div>
      <div class="wb-text">${escHtml(parsedWelcomeMsg)}</div>
    </div>`;

  if(s.faqs && s.faqs.length > 0){
    html += `
      <div class="suggested-section">
        <div class="sq-label"><i class="fa-solid fa-circle-question"></i> সাধারণ জিজ্ঞাসা (FAQ)</div>
        <div class="sq-chips">
          ${s.faqs.map((faq, i) => `<div class="sq-chip" onclick="triggerFaq(${i})">${escHtml(faq.q)}</div>`).join('')}
        </div>
      </div>`;
  }

  const userMsgs = window._messages.filter(m=>m.sender==='user'&&!m.deleted);
  
  if(userMsgs.length === 0 && s.suggestedQueries?.length){
    html += `
      <div class="suggested-section">
        <div class="sq-label"><i class="fa-solid fa-lightbulb"></i> প্রায়শই জিজ্ঞাসিত</div>
        <div class="sq-chips">
          ${s.suggestedQueries.map(q=>`<div class="sq-chip" onclick="selectSuggested('${escAttr(q)}')">${escHtml(q)}</div>`).join('')}
        </div>
      </div>`;
  }

  let lastDate = '';
  window._messages.forEach(m => {
    const d = m.timestamp?.toDate ? m.timestamp.toDate() : (m.timestamp ? new Date(m.timestamp) : new Date());
    const dateLabel = d.toLocaleDateString('bn-BD',{weekday:'long',day:'numeric',month:'long'});
    if(dateLabel !== lastDate){
      html += `<div class="date-divider">${dateLabel}</div>`;
      lastDate = dateLabel;
    }
    const isUser = m.sender==='user';
    const t = d.toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});
    const deletedCls = m.deleted ? 'deleted' : '';
    const editedCls = m.edited && !m.deleted ? 'edited' : '';
    const aiTag = m.isAI ? '<span class="ai-tag">AI Generated</span><br>' : '';

    let avatarHTML = '';
    if(isUser) {
        if(window._userPhoto) avatarHTML = `<img src="${window._userPhoto}" style="width:100%;height:100%;object-fit:cover;">`;
        else avatarHTML = `${(window._userName || 'আমি').charAt(0).toUpperCase()}`;
    }

    html += `
      <div class="msg-row ${isUser?'from-user':'from-admin'}" data-id="${m.id}">
        ${!isUser?`<div class="msg-avatar"><i class="fa-solid fa-headset"></i></div>` : `<div class="msg-avatar">${avatarHTML}</div>`}
        <div class="bubble-wrap">
          <div class="bubble ${isUser?'from-user':'from-admin'} ${deletedCls} ${editedCls}"
            data-id="${m.id}" data-sender="${m.sender}"
            oncontextmenu="onBubbleContextMenu(event,'${m.id}','${m.sender}')"
            ontouchstart="onBubbleTouchStart(event,'${m.id}','${m.sender}')"
            ontouchend="onBubbleTouchEnd()"
            ontouchmove="onBubbleTouchEnd()">
            ${aiTag} ${m.deleted ? '<i>এই বার্তাটি মুছে ফেলা হয়েছে</i>' : escHtml(m.text||'')}
          </div>
          <div class="msg-meta">
            ${t}
            ${isUser && !m.deleted ? `<span style="font-size:11px; margin-left:4px; font-weight:600; color:${m.read?'var(--green-main)':'var(--gray-400)'}">${m.read?'Read':'Unread'}</span>` : ''}
          </div>
        </div>
      </div>`;
  });

  // Change 2: Preserve Typing indicator state during rerenders
  html += `<div class="typing-row" id="typing-row" style="display:${window._adminIsTyping ? 'flex' : 'none'}">
    <div class="msg-avatar"><i class="fa-solid fa-headset"></i></div>
    <div class="typing-bubble">
      <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
    </div>
  </div>`;

  area.innerHTML = html;
  if(isAtBottom) scrollToBottom();
  updateScrollBtn();
}

function escHtml(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function escAttr(t){ return String(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

window.triggerFaq = async function(index) {
    const s = window._settings;
    if(!s || !s.faqs || !s.faqs[index]) return;
    const faq = s.faqs[index];
    
    if(window.sendToFirestore) await window.sendToFirestore(faq.q);
    if(window.setTypingFirestore) window.setTypingFirestore(true);
    
    setTimeout(async () => {
        if(window._fs && window._db) {
            const { addDoc, doc, collection, serverTimestamp, setDoc } = window._fs;
            await addDoc(collection(window._db, 'chats', window.USER_ID, 'messages'), {
                text: faq.a, sender:'admin', timestamp: serverTimestamp(), read:false, deleted:false, edited:false, isAI: true
            });
            await setDoc(doc(window._db, 'chats', window.USER_ID), {
                lastMessage: faq.a, lastMessageTime: serverTimestamp(), lastSender: 'admin', unreadAdmin: 0
            }, {merge:true});
        }
        if(window.setTypingFirestore) window.setTypingFirestore(false);
    }, 1000);
};

async function sendMessage(){
  const ta = document.getElementById('msg-input');
  const text = ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='';
  document.getElementById('send-btn').disabled = true;
  closeEmojiPicker();

  if(window.sendToFirestore) await window.sendToFirestore(text);
  checkAutoReply(text);
  if(window.setTypingFirestore) window.setTypingFirestore(false);
}
window.sendMessage = sendMessage;

function checkAutoReply(text){
  const s = window._settings || defaultSettings();
  if(!s.autoReply) return;
  const lower = text.toLowerCase();
  const matched = s.keywords?.find(k => lower.includes(k.kw.toLowerCase()));
  if(matched){
    setTimeout(()=>{
      if(window.setTypingFirestore) window.setTypingFirestore(true);
    }, 500);
  }
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey&&!isMobile()){
    e.preventDefault(); sendMessage();
  }
}
window.handleKey = handleKey;

function onInputChange(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
  if(window.setTypingFirestore){
    window.setTypingFirestore(true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>window.setTypingFirestore(false), 2000);
  }
}
window.onInputChange = onInputChange;

function isMobile(){ return /Mobi|Android|iPhone/i.test(navigator.userAgent); }

// Change 2: Handle typing visibility with global state
function setAdminTyping(typing){
  window._adminIsTyping = typing;
  const row = document.getElementById('typing-row');
  if(row){
      row.style.display = typing ? 'flex' : 'none';
      if(typing) scrollToBottom();
  }
}
window.setAdminTyping = setAdminTyping;

function scrollToBottom(){
  const area = document.getElementById('messages-area');
  area.scrollTo({top:area.scrollHeight, behavior:'smooth'});
}
window.scrollToBottom = scrollToBottom;

function updateScrollBtn(){
  const area = document.getElementById('messages-area');
  const btn = document.getElementById('scroll-down-btn');
  const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  isAtBottom = atBottom;
  btn.classList.toggle('visible', !atBottom);
}
document.getElementById('messages-area').addEventListener('scroll', updateScrollBtn);

function buildEmojiPicker(){
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = EMOJIS.map(e=>`<span class="e-item" onclick="insertEmoji('${e}')">${e}</span>`).join('');
}
function toggleEmoji(){
  const p = document.getElementById('emoji-picker');
  p.classList.toggle('open');
}
window.toggleEmoji = toggleEmoji;
function closeEmojiPicker(){
  document.getElementById('emoji-picker').classList.remove('open');
}
function insertEmoji(em){
  const ta = document.getElementById('msg-input');
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0,pos)+em+ta.value.slice(pos);
  ta.selectionStart = ta.selectionEnd = pos+em.length;
  ta.focus();
  document.getElementById('send-btn').disabled = !ta.value.trim();
  closeEmojiPicker();
}
window.insertEmoji = insertEmoji;

window.selectSuggested = function(text){
  document.getElementById('msg-input').value = text;
  document.getElementById('send-btn').disabled = false;
  sendMessage();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONTEXT MENU & EDITING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let holdTimer = null;
let activeMsgText = '';

function onBubbleContextMenu(e, msgId, sender){
  e.preventDefault();
  openCtxMenu(e.clientX, e.clientY, msgId, sender);
}
window.onBubbleContextMenu = onBubbleContextMenu;

function onBubbleTouchStart(e, msgId, sender){
  const touch = e.touches[0];
  holdTimer = setTimeout(()=>{
    openCtxMenu(touch.clientX, touch.clientY, msgId, sender);
  }, 500);
}
window.onBubbleTouchStart = onBubbleTouchStart;

function onBubbleTouchEnd(){
  clearTimeout(holdTimer);
}
window.onBubbleTouchEnd = onBubbleTouchEnd;

function openCtxMenu(x, y, msgId, sender){
  ctxMsgId = msgId;
  const menu = document.getElementById('ctx-menu');
  const editBtn = document.getElementById('ctx-edit-btn');
  const msg = window._messages.find(m=>m.id===msgId);
  if(!msg || msg.deleted) return;

  activeMsgText = msg.text||'';
  editBtn.style.display = sender==='user' ? 'flex' : 'none';
  document.querySelector('.ctx-item.danger').style.display = sender==='user' ? 'flex' : 'none';

  menu.style.display = 'block';
  const mw=160, mh=120;
  const shell = document.getElementById('phone-shell').getBoundingClientRect();
  let lx = x - shell.left, ly = y - shell.top;
  if(lx+mw > shell.width) lx = shell.width - mw - 8;
  if(ly+mh > shell.height) ly = ly - mh;
  menu.style.left = (shell.left+lx)+'px';
  menu.style.top = (shell.top+ly)+'px';
  document.getElementById('overlay-mask').classList.add('show');
}

function closeCtxMenu(){
  document.getElementById('ctx-menu').style.display='none';
  document.getElementById('overlay-mask').classList.remove('show');
}
window.closeCtxMenu = closeCtxMenu;

window.ctxCopy = function(){
  const msg = window._messages.find(m=>m.id===ctxMsgId);
  if(msg?.text) navigator.clipboard?.writeText(msg.text).catch(()=>{});
  closeCtxMenu();
};

window.ctxEdit = function(){
  closeCtxMenu();
  const msg = window._messages.find(m=>m.id===ctxMsgId);
  if(!msg) return;
  editMsgId = ctxMsgId;
  document.getElementById('edit-ta').value = msg.text||'';
  document.getElementById('edit-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('edit-ta').focus(),100);
};

window.cancelEdit = function(e){
  if(e && e.target!==document.getElementById('edit-overlay')) return;
  document.getElementById('edit-overlay').style.display='none';
  editMsgId = null;
};

window.confirmEdit = async function(){
  const newText = document.getElementById('edit-ta').value.trim();
  if(!newText || !editMsgId) return;
  const msg = window._messages.find(m=>m.id===editMsgId);
  document.getElementById('edit-overlay').style.display='none';
  editMsgId=null;
  if(window.updateMsgFirestore) await window.updateMsgFirestore(msg.id, {text:newText, edited:true});
};

window.ctxDelete = async function(){
  closeCtxMenu();
  const msg = window._messages.find(m=>m.id===ctxMsgId);
  if(!msg) return;
  if(window.updateMsgFirestore) await window.updateMsgFirestore(msg.id, {deleted:true, text:''});
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NETWORK STATUS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener('online', ()=>document.getElementById('conn-banner').classList.remove('show'));
window.addEventListener('offline', ()=>document.getElementById('conn-banner').classList.add('show'));

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initApp(){
  buildEmojiPicker();

  document.addEventListener('click', (e)=>{
    if(!e.target.closest('#emoji-picker') && !e.target.closest('#emoji-btn')) closeEmojiPicker();
  });

  if(window.loadUserSettings) window.loadUserSettings();
  if(window.listenMessages) window.listenMessages();
  if(window.listenAdminStatus) window.listenAdminStatus();
  if(window.listenAdminTyping) window.listenAdminTyping();
}
</script>
</body>
</html>
