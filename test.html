<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPay Full Flow Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        .tester-card { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .step-box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fafafa; }
        .step-title { font-weight: bold; color: #d12053; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: #d12053; }
        .note { font-size: 11px; color: #dc3545; margin-top: 5px; display: block; line-height: 1.4; }
        
        .btn-action { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-action:hover { background: #218838; }
        .btn-test { background: #007bff; margin-top: 10px; }
        .btn-test:hover { background: #0056b3; }
        
        .result-box { margin-top: 15px; background: #282c34; color: #98c379; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 13px; min-height: 80px; overflow-wrap: break-word; white-space: pre-wrap; }
        .status { text-align: center; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .status.success { color: #28a745; }
        .status.error { color: #dc3545; }
    </style>
</head>
<body>

<div class="tester-card">
    <h2>API Testing Tool</h2>
    <p class="subtitle">মার্চেন্ট আইডি তৈরি এবং পেমেন্ট টেস্ট করুন</p>

    <!-- Step 1: Database Setup -->
    <div class="step-box">
        <div class="step-title">ধাপ ১: ডাটাবেজে মার্চেন্ট এড করুন</div>
        <div class="form-group">
            <label>Testing Domain (অটোমেটিক ডিটেক্ট করা হয়েছে)</label>
            <input type="text" id="testDomain" readonly style="background:#eee; color:#555;">
            <span class="note">এই ডোমেনটি ডাটাবেজে সেভ হবে যেন সিকিউরিটি চেকিং কাজ করে।</span>
        </div>
        <button class="btn-action" id="saveMerchantBtn" onclick="generateAndSaveMerchant()">জெனারেট ও সেভ করুন</button>
        <div id="db-status" class="status"></div>
    </div>

    <!-- Step 2: Payment Test -->
    <div class="step-box">
        <div class="step-title">ধাপ ২: পেমেন্ট টেস্ট করুন</div>
        
        <div class="form-group">
            <label>Gateway Base URL (যেখানে p2p ফোল্ডার আছে)</label>
            <input type="url" id="gatewayUrl" placeholder="https://yourdomain.com">
            <span class="note">* লাইভ সাইটের ডোমেন দিন (যেমন: https://topupshopnur.web.app)। শেষে (/) দিবেন না।</span>
        </div>

        <div class="form-group">
            <label>Merchant ID</label>
            <input type="text" id="merchantId" placeholder="ধাপ ১ সম্পন্ন হলে অটোমেটিক আসবে" readonly style="background:#eee;">
        </div>

        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;">
                <label>টাকার পরিমাণ</label>
                <input type="number" id="payAmount" value="10">
            </div>
            <div class="form-group" style="flex:1;">
                <label>পেমেন্ট মেথড</label>
                <select id="payMethod">
                    <option value="bkash">bKash</option>
                    <option value="nagad">Nagad</option>
                </select>
            </div>
        </div>

        <button class="btn-action btn-test" id="startTestBtn" onclick="startTestPayment()" disabled style="background:#ccc;">পেমেন্ট শুরু করুন</button>

        <div id="status-msg" class="status"></div>
    </div>

    <div class="form-group">
        <label>Response / Result:</label>
        <div class="result-box" id="resultBox">Waiting for action...</div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // ==========================================
    // আপনার ফায়ারবেজ কনফিগারেশন এখানে বসান
    // (অবশ্যই আপনার অরিজিনাল API Key দিবেন)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCFNNXY4oRMg8AjhWa9PqCN8gdILmwdRk0",
      authDomain: "autopay-api.firebaseapp.com",
      databaseURL: "https://autopay-api-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "autopay-api",
      storageBucket: "autopay-api.firebasestorage.app",
      messagingSenderId: "560907178391",
      appId: "1:560907178391:web:aa544aedc91be464cd74d2"
      // ... অন্যান্য তথ্য
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // পেজ লোড হওয়ার পর কারেন্ট ডোমেন সেট করা
    window.onload = function() {
        document.getElementById('testDomain').value = window.location.origin;
        // ডিফল্টভাবে গেটওয়ে ইউআরএল হিসেবে কারেন্ট ডোমেন দিয়ে রাখলাম, চাইলে পরিবর্তন করা যাবে
        document.getElementById('gatewayUrl').value = window.location.origin; 
    };

    // --- ধাপ ১: ডাটাবেজে মার্চেন্ট সেভ করা ---
    async function generateAndSaveMerchant() {
        const domain = document.getElementById('testDomain').value;
        const dbStatus = document.getElementById('db-status');
        const btn = document.getElementById('saveMerchantBtn');
        const resultBox = document.getElementById('resultBox');

        btn.disabled = true;
        btn.innerText = "Saving to Database...";

        // রেন্ডম মার্চেন্ট আইডি তৈরি করা
        const newMerchantId = "MER-" + Math.floor(Math.random() * 90000000 + 10000000);

        try {
            // ডাটাবেজের 'Merchants' কালেকশনে সেভ করা
            await db.collection('Merchants').doc(newMerchantId).set({
                merchantId: newMerchantId,
                domain: domain,
                email: "test-developer@autopay.com",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            dbStatus.innerText = "মার্চেন্ট আইডি সফলভাবে সেভ হয়েছে!";
            dbStatus.className = "status success";
            
            // ধাপ ২ এর ইনপুট বক্সে আইডি বসানো এবং বাটন চালু করা
            document.getElementById('merchantId').value = newMerchantId;
            const startBtn = document.getElementById('startTestBtn');
            startBtn.disabled = false;
            startBtn.style.background = "#007bff";

            resultBox.innerText = `[Database] Successfully saved to 'Merchants' collection.\nMerchant ID: ${newMerchantId}\nDomain: ${domain}`;
            btn.innerText = "সেভ সম্পন্ন";

        } catch (error) {
            dbStatus.innerText = "ডাটাবেজে সেভ হতে সমস্যা হয়েছে!";
            dbStatus.className = "status error";
            resultBox.innerText = "[Firebase Error] " + error.message + "\n\n* অনুগ্রহ করে চেক করুন আপনার ফায়ারবেজ কনফিগারেশন ঠিক আছে কিনা এবং ফায়ারস্টোর রুলস Allow করা আছে কিনা।";
            btn.disabled = false;
            btn.innerText = "আবার চেষ্টা করুন";
        }
    }

    // --- ধাপ ২: পেমেন্ট টেস্ট শুরু করা ---
    function startTestPayment() {
        const baseUrl = document.getElementById('gatewayUrl').value.trim();
        const mId = document.getElementById('merchantId').value.trim();
        const amount = document.getElementById('payAmount').value.trim();
        const method = document.getElementById('payMethod').value;
        const resultBox = document.getElementById('resultBox');
        const statusMsg = document.getElementById('status-msg');

        if (!baseUrl.startsWith('http')) return alert("সঠিক Gateway URL দিন।");
        if (!mId) return alert("প্রথমে ধাপ ১ সম্পন্ন করুন।");
        if (!amount || amount <= 0) return alert("সঠিক টাকার পরিমাণ দিন।");

        const orderId = "TEST-ORD-" + Math.floor(Math.random() * 90000 + 10000);

        const payload = btoa(JSON.stringify({
            amount: amount,
            orderId: orderId,
            merchantId: mId
        }));

        const endpoint = method === 'bkash' ? '/p2p/bkash-payment.html' : '/p2p/nagad-payment.html';
        const cleanBaseUrl = baseUrl.replace(/\/$/, ""); 
        const paymentUrl = `${cleanBaseUrl}${endpoint}?data=${payload}`;

        resultBox.innerText = `Opening popup:\n${paymentUrl}\n\nOrderID: ${orderId}`;
        statusMsg.innerText = "পেমেন্ট উইন্ডো ওপেন হয়েছে...";
        statusMsg.className = "status";

        const width = 400; const height = 650;
        const left = (window.innerWidth / 2) - (width / 2);
        const top = (window.innerHeight / 2) - (height / 2);
        const popup = window.open(paymentUrl, "AutoPayTest", `width=${width},height=${height},top=${top},left=${left}`);

        window.addEventListener("message", function handler(event) {
            if (event.data && event.data.status === 'SUCCESS') {
                const responseData = event.data.data;
                
                statusMsg.innerText = "পেমেন্ট সফলভাবে ভেরিফাই হয়েছে!";
                statusMsg.className = "status success";
                resultBox.innerText = JSON.stringify(responseData, null, 4);
                
                // টেস্ট অর্ডার সেভ করা
                db.collection('TestOrders').doc(responseData.orderId).set({
                    ...responseData,
                    paymentMethod: method,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    resultBox.innerText += "\n\n[Database] Order saved successfully to 'TestOrders'!";
                });

                popup.close();
                window.removeEventListener("message", handler);
            } 
            else if (event.data && event.data.status === 'CLOSED') {
                statusMsg.innerText = "পেমেন্ট বাতিল করা হয়েছে।";
                statusMsg.className = "status error";
                resultBox.innerText = "User closed the payment popup.";
                window.removeEventListener("message", handler);
            }
        });
    }
</script>

</body>
</html>
