<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPay Advanced Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; }
        .tester-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        .stepper { display: flex; justify-content: center; margin-bottom: 25px; gap: 10px; }
        .step { padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; background: #eee; color: #888; }
        .step.active { background: #007bff; color: #fff; }
        .step.completed { background: #28a745; color: #fff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 13px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; color: white; border: none; padding: 14px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: #28a745; }
        .btn-next { background: #17a2b8; display: none; }
        .btn-proceed { background: #007bff; }
        .summary-box { display: none; margin-top: 20px; border: 2px solid #eee; border-radius: 8px; overflow: hidden; }
        .summary-header { background: #f8f9fa; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 2px solid #eee; }
        .summary-body { padding: 15px; font-size: 14px; line-height: 1.8; color: #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="tester-card">
    <h2>Client System Environment</h2>
    <div class="stepper">
        <div class="step active" id="step1-indicator">Step 1: Config</div>
        <div class="step" id="step2-indicator">Step 2: Pay</div>
    </div>

    <!-- Step 1 -->
    <div id="page-1">
        <div class="form-group">
            <label>Gateway Base URL (যেখানে পেমেন্ট পেজ হোস্ট করা)</label>
            <input type="url" id="gatewayUrl" placeholder="https://gateway-domain.com">
        </div>
        <div class="form-group">
            <label>Merchant ID</label>
            <input type="text" id="merchantId" placeholder="e.g. MER-123456">
        </div>
        <div class="form-group">
            <label>bKash API Key</label>
            <input type="text" id="bkashApi">
        </div>
        <div class="form-group">
            <label>Nagad API Key</label>
            <input type="text" id="nagadApi">
        </div>

        <button class="btn btn-save" id="saveBtn" onclick="saveToClientDatabase()">Save Configuration</button>
        <button class="btn btn-next" id="nextBtn" onclick="goToPage2()">Next Step &rarr;</button>
        <div id="db-msg" style="text-align:center; font-size:13px; font-weight:bold; margin-top:10px;"></div>
    </div>

    <!-- Step 2 -->
    <div id="page-2" class="hidden">
        <!-- নতুন অর্ডার আইডি ফিল্ড যুক্ত করা হলো -->
        <div class="form-group">
            <label>অর্ডার আইডি (Order ID)</label>
            <input type="text" id="orderIdInput" value="ORD-12345">
        </div>
        <div class="form-group">
            <label>টাকার পরিমাণ (Amount)</label>
            <input type="number" id="payAmount" value="10">
        </div>
        <div class="form-group">
            <label>পেমেন্ট মেথড</label>
            <select id="payMethod">
                <option value="bkash">bKash</option>
                <option value="nagad">Nagad</option>
            </select>
        </div>
        <button class="btn btn-proceed" id="proceedBtn" onclick="proceedPayment()">Proceed to Pay</button>
        <button class="btn" style="background:#6c757d;" onclick="goToPage1()">&larr; Back to Setup</button>
        
        <div class="summary-box" id="summaryBox">
            <div class="summary-header" id="summaryHeader">Status</div>
            <div class="summary-body" id="summaryBody"></div>
        </div>
    </div>
</div>

<!-- Firebase (Client Database) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const clientFirebaseConfig = {
        apiKey: "AIzaSyAtfjaSSlaDYUsogHrvBn_6MbEbM-M-O4Q",
        authDomain: "test-g-login-nur.firebaseapp.com",
        projectId: "test-g-login-nur",
        storageBucket: "test-g-login-nur.firebasestorage.app",
        messagingSenderId: "19016505156",
        appId: "1:19016505156:web:72b1480a444317853f6911"
    };
    if (!firebase.apps.length) firebase.initializeApp(clientFirebaseConfig);
    const clientDb = firebase.firestore();

    let savedConfig = {};

    async function saveToClientDatabase() {
        const btn = document.getElementById('saveBtn');
        const msg = document.getElementById('db-msg');
        
        const gUrl = document.getElementById('gatewayUrl').value.trim();
        const mId = document.getElementById('merchantId').value.trim();
        const bApi = document.getElementById('bkashApi').value.trim();
        const nApi = document.getElementById('nagadApi').value.trim();

        if(!gUrl || !mId || !bApi || !nApi) return msg.innerText = "সবগুলো ঘর পূরণ করুন!";

        btn.disabled = true; btn.innerText = "Saving...";

        try {
            await clientDb.collection('Merchants').doc(mId).set({
                merchantId: mId,
                bkashApi: bApi,
                nagadApi: nApi,
                gatewayUrl: gUrl
            });

            savedConfig = { gatewayUrl: gUrl, merchantId: mId, bkashApi: bApi, nagadApi: nApi };
            msg.innerText = "ডাটাবেজে সেভ হয়েছে!";
            msg.style.color = "#28a745";
            btn.style.display = "none";
            document.getElementById('nextBtn').style.display = "block";
            document.getElementById('step1-indicator').classList.add('completed');
        } catch (error) {
            msg.innerText = "Error: " + error.message;
            btn.disabled = false; btn.innerText = "Save Configuration";
        }
    }

    function goToPage2() {
        document.getElementById('page-1').classList.add('hidden');
        document.getElementById('page-2').classList.remove('hidden');
        document.getElementById('step2-indicator').classList.add('active');
    }
    
    function goToPage1() {
        document.getElementById('page-2').classList.add('hidden');
        document.getElementById('page-1').classList.remove('hidden');
        document.getElementById('step2-indicator').classList.remove('active');
        document.getElementById('summaryBox').style.display = "none";
    }

    function proceedPayment() {
        const orderId = document.getElementById('orderIdInput').value.trim();
        const amount = document.getElementById('payAmount').value.trim();
        const method = document.getElementById('payMethod').value;
        
        if(!orderId) return alert("অর্ডার আইডি দিন!");
        if(!amount || amount <= 0) return alert("সঠিক টাকার পরিমাণ দিন!");

        const selectedApiKey = method === 'bkash' ? savedConfig.bkashApi : savedConfig.nagadApi;

        const payload = btoa(JSON.stringify({
            amount: amount,
            orderId: orderId, // ইউজার ইনপুট থেকে নেওয়া অর্ডার আইডি পাঠানো হচ্ছে
            merchantId: savedConfig.merchantId,
            apiKey: selectedApiKey,
            method: method,
            domain: window.location.origin 
        }));

        const cleanBaseUrl = savedConfig.gatewayUrl.replace(/\/$/, ""); 
        const endpoint = method === 'bkash' ? '/p2p/bkash-payment.html' : '/p2p/nagad-payment.html';
        const paymentUrl = `${cleanBaseUrl}${endpoint}?data=${payload}`;

        const pBtn = document.getElementById('proceedBtn');
        pBtn.innerText = "Awaiting Response...";
        pBtn.disabled = true;

        document.getElementById('summaryBox').style.display = "none";

        const width = 400; const height = 650;
        const left = (window.innerWidth / 2) - (width / 2);
        const top = (window.innerHeight / 2) - (height / 2);
        const popup = window.open(paymentUrl, "AutoPayTest", `width=${width},height=${height},top=${top},left=${left}`);

        window.addEventListener("message", function handler(event) {
            pBtn.innerText = "Proceed to Pay";
            pBtn.disabled = false;

            if (event.data) {
                showSummary(event.data, amount, orderId, method);
                window.removeEventListener("message", handler);
            }
        });
    }

    function showSummary(response, amount, orderId, method) {
        const box = document.getElementById('summaryBox');
        const header = document.getElementById('summaryHeader');
        const body = document.getElementById('summaryBody');

        box.style.display = "block";
        body.innerHTML = ""; 

        if (response.status === 'SUCCESS') {
            header.innerText = "PAYMENT SUCCESSFUL";
            header.style.color = "green";
            
            const data = response.data;
            body.innerHTML = `
                <div class="summary-row"><span>Status:</span> <strong style="color:#28a745;">SUCCESS</strong></div>
                <div class="summary-row"><span>Order ID:</span> <strong>${data.orderId}</strong></div>
                <div class="summary-row"><span>Transaction ID:</span> <strong>${data.trxID}</strong></div>
                <div class="summary-row"><span>Amount:</span> <strong>৳ ${data.amount}</strong></div>
                <div class="summary-row"><span>Method:</span> <strong>${data.method || method.toUpperCase()}</strong></div>
            `;
        } 
        else if (response.status === 'FAILED') {
            header.innerText = "PAYMENT FAILED";
            header.style.color = "red";
            
            body.innerHTML = `
                <div class="summary-row"><span>Status:</span> <strong style="color:#dc3545;">FAILED</strong></div>
                <div class="summary-row"><span>Order ID:</span> <strong>${orderId}</strong></div>
                <div class="summary-row"><span>Error Message:</span> <strong>${response.message || 'Unknown Error'}</strong></div>
            `;
        } 
        else if (response.status === 'CLOSED') {
            header.innerText = "WINDOW CLOSED";
            header.style.color = "#ffc107";
            
            body.innerHTML = `
                <div class="summary-row"><span>Status:</span> <strong style="color:#ffc107;">CANCELLED</strong></div>
                <div class="summary-row"><span>Reason:</span> <strong>User closed the popup manually.</strong></div>
            `;
        }
    }
</script>

</body>
</html>
