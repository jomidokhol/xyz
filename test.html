<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPay API Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .tester-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: #007bff; }
        .note { font-size: 11px; color: #dc3545; margin-top: 5px; display: block; }
        
        .btn-test { width: 100%; background: #007bff; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-test:hover { background: #0056b3; }
        
        .result-box { margin-top: 25px; background: #282c34; color: #98c379; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 14px; min-height: 100px; overflow-wrap: break-word; white-space: pre-wrap; }
        .status { text-align: center; font-weight: bold; margin-top: 10px; }
        .status.success { color: #28a745; }
        .status.error { color: #dc3545; }
    </style>
</head>
<body>

<div class="tester-card">
    <h2>API Testing Tool</h2>
    <p class="subtitle">আপনার পেমেন্ট সিস্টেম লাইভ টেস্ট করুন</p>

    <!-- নতুন যুক্ত করা URL ফিল্ড -->
    <div class="form-group">
        <label>Gateway Base URL (আপনার লাইভ সাইটের লিংক)</label>
        <input type="url" id="gatewayUrl" placeholder="https://yourdomain.com" value="https://yourdomain.com">
        <span class="note">* শেষে স্ল্যাশ (/) দিবেন না। এই ডোমেনেই আপনার p2p ফোল্ডারটি হোস্ট করা থাকতে হবে।</span>
    </div>

    <div class="form-group">
        <label>Merchant ID (ডাটাবেজে যা ম্যানুয়ালি সেভ করেছেন)</label>
        <input type="text" id="merchantId" placeholder="e.g. MER-12345678" value="MER-12345678">
    </div>

    <div class="form-group">
        <label>টাকার পরিমাণ (Amount)</label>
        <input type="number" id="payAmount" placeholder="e.g. 10" value="10">
    </div>

    <div class="form-group">
        <label>পেমেন্ট মেথড</label>
        <select id="payMethod">
            <option value="bkash">bKash</option>
            <option value="nagad">Nagad</option>
        </select>
    </div>

    <button class="btn-test" onclick="startTestPayment()">পেমেন্ট শুরু করুন</button>

    <div id="status-msg" class="status"></div>

    <div class="form-group" style="margin-top: 20px;">
        <label>Response / Result:</label>
        <div class="result-box" id="resultBox">Waiting for payment response...</div>
    </div>
</div>

<!-- Firebase SDKs for saving test order -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // আপনার ফায়ারবেজ কনফিগারেশন দিন (যাতে টেস্ট ডাটা সেভ করতে পারেন)
    const firebaseConfig = {
      apiKey: "AIzaSyCFNNXY4oRMg8AjhWa9PqCN8gdILmwdRk0",
      authDomain: "autopay-api.firebaseapp.com",
      databaseURL: "https://autopay-api-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "autopay-api",
      storageBucket: "autopay-api.firebasestorage.app",
      messagingSenderId: "560907178391",
      appId: "1:560907178391:web:aa544aedc91be464cd74d2"
      // ... অন্যান্য তথ্য
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function startTestPayment() {
        const baseUrl = document.getElementById('gatewayUrl').value.trim();
        const mId = document.getElementById('merchantId').value.trim();
        const amount = document.getElementById('payAmount').value.trim();
        const method = document.getElementById('payMethod').value;
        const resultBox = document.getElementById('resultBox');
        const statusMsg = document.getElementById('status-msg');

        if (!baseUrl.startsWith('http')) {
            alert("অনুগ্রহ করে সঠিক Gateway URL দিন (http বা https সহ)।");
            return;
        }

        if (!mId || !amount || amount <= 0) {
            alert("অনুগ্রহ করে Merchant ID এবং সঠিক টাকার পরিমাণ দিন।");
            return;
        }

        // Random Order ID generate
        const orderId = "TEST-ORD-" + Math.floor(Math.random() * 90000 + 10000);

        // ১. ডাটা এনকোড করা
        const payload = btoa(JSON.stringify({
            amount: amount,
            orderId: orderId,
            merchantId: mId
        }));

        // ২. URL তৈরি করা (আপনার ইনপুট দেওয়া ডোমেন অনুযায়ী)
        const endpoint = method === 'bkash' ? '/p2p/bkash-payment.html' : '/p2p/nagad-payment.html';
        
        // baseUrl এর শেষে যদি স্ল্যাশ থাকে তা রিমুভ করে দেওয়া হচ্ছে
        const cleanBaseUrl = baseUrl.replace(/\/$/, ""); 
        const paymentUrl = `${cleanBaseUrl}${endpoint}?data=${payload}`;

        resultBox.innerText = `Opening popup URL:\n${paymentUrl}\n\nOrderID: ${orderId}`;
        statusMsg.innerText = "পেমেন্ট উইন্ডো ওপেন হয়েছে...";
        statusMsg.className = "status";

        // ৩. পপআপ ওপেন করা
        const width = 400; const height = 650;
        const left = (window.innerWidth / 2) - (width / 2);
        const top = (window.innerHeight / 2) - (height / 2);
        const popup = window.open(paymentUrl, "AutoPayTest", `width=${width},height=${height},top=${top},left=${left}`);

        // ৪. পপআপ থেকে ডাটা শোনার জন্য Listener
        window.addEventListener("message", function handler(event) {
            if (event.data && event.data.status === 'SUCCESS') {
                const responseData = event.data.data;
                
                statusMsg.innerText = "পেমেন্ট সফলভাবে ভেরিফাই হয়েছে!";
                statusMsg.className = "status success";
                
                resultBox.innerText = JSON.stringify(responseData, null, 4);
                
                // ডাটাবেজে টেস্ট অর্ডার সেভ করা
                db.collection('TestOrders').doc(responseData.orderId).set({
                    ...responseData,
                    paymentMethod: method,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    resultBox.innerText += "\n\n[Database] Order saved successfully to 'TestOrders' collection!";
                }).catch((err) => {
                    resultBox.innerText += "\n\n[Database Error] " + err.message;
                });

                popup.close();
                window.removeEventListener("message", handler);
            } 
            else if (event.data && event.data.status === 'CLOSED') {
                statusMsg.innerText = "পেমেন্ট বাতিল করা হয়েছে।";
                statusMsg.className = "status error";
                resultBox.innerText = "User closed the payment popup.";
                window.removeEventListener("message", handler);
            }
        });
    }
</script>

</body>
</html>
